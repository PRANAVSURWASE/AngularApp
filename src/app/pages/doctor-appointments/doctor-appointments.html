<div class="container mt-4">

  <h3 class="mb-4">Doctor Appointments</h3>

  <div class="card shadow-sm p-3">
    <table class="table table-bordered table-striped align-middle">
      <thead class="table-dark">
        <tr>
          <th>Id</th>
          <th>Patient</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let a of appointments">
          <td>{{ a.id }}</td>
          <td>{{ a.patientName }}</td>
          <td>{{ a.appointmentDate }}</td>

         <td>
  <span *ngIf="a.status == 'Booked'" class="badge bg-warning text-dark">Booked</span>
  <span *ngIf="a.status == 'Cancelled'" class="badge bg-danger">Cancelled</span>
  <span *ngIf="a.status == 'Completed'" class="badge bg-success">Completed</span>
</td>

<td>
  <button 
    *ngIf="a.status == 'Booked'"
    class="btn btn-success btn-sm me-2"
    (click)="complete(a.id)">
    Complete
  </button>

  <button 
    *ngIf="a.status == 'Booked'"
    class="btn btn-danger btn-sm"
    (click)="cancel(a.id)">
    Cancel
  </button>

  <span *ngIf="a.status != 'Booked'" class="text-muted">No action</span>
</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
