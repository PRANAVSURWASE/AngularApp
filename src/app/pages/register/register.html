<div class="d-flex justify-content-center align-items-center bg-light" style="height: calc(100vh - 70px);">
  <div class="card shadow p-4" style="width: 380px;">
    <h3 class="text-center mb-4">Register User</h3>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input [(ngModel)]="username" class="form-control" placeholder="Enter username">
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input [(ngModel)]="password" type="password" class="form-control" placeholder="Enter password">
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select [(ngModel)]="role" class="form-select">
        <option>Patient</option>
        <option>Doctor</option>
        <option>Admin</option>
      </select>
    </div>

    <button class="btn btn-dark w-100 mt-3" (click)="register()">Register</button>

    <p class="text-center mt-3">
        Already have an account?
        <button class="btn btn-link p-0" (click)="goLogin()">Login</button>
    </p>
  </div>
</div>
