<div class="container mt-4">

  <h3 class="mb-4">Patient Profile</h3>

  <div class="row g-4">

    <div class="col-md-5">
      <div class="card shadow-sm p-4 h-100">
        <h4 class="mb-3">My Profile</h4>

        <div *ngIf="profile; else noProfile">
          <p><strong>Name:</strong> {{ profile.name }}</p>
          <p><strong>Age:</strong> {{ profile.age }}</p>
        </div>

        <ng-template #noProfile>
          <p class="text-muted">No profile created yet.</p>
        </ng-template>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow-sm p-4 h-100">
        <h4 class="mb-3">Create / Update Profile</h4>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input [(ngModel)]="name" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label">Age</label>
          <input [(ngModel)]="age" type="number" class="form-control" placeholder="Enter your age">
        </div>

        <button class="btn btn-success" (click)="createProfile()">Save Profile</button>
      </div>
    </div>

  </div>

</div>
